[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#31333F"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[server]
headless = true
port = 7860
enableXsrfProtection = true
maxUploadSize = 100

[logger]
level = "info"

[browser]
gatherUsageStats = false
